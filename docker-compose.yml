version: "3.9"

services:
  # PostgreSQL — project & session persistence
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openmep}
      POSTGRES_USER: ${POSTGRES_USER:-openmep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmep} -d ${POSTGRES_DB:-openmep}"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openmep_net

  # FastAPI calculation engine (Python)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-openmep}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openmep}}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - openmep_net

  # Node.js Project Management API (TypeScript/Express)
  # Handles: project workspaces, version history, submission packaging, branding
  node-api:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PROJECTS_DIR=/data/projects
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - projectdata:/data/projects
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - openmep_net

  # Streamlit UI
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      streamlit run streamlit_app/app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
      - NODE_API_BASE=http://node-api:8080
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-openmep}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-openmep}}
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
      node-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - openmep_net

networks:
  openmep_net:
    driver: bridge

volumes:
  pgdata:
  projectdata:
